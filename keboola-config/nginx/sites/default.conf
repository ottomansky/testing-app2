server {
    listen 8888;
    server_name _;

    # Keboola health probe: POST to exact root only
    # IMPORTANT: This MUST be `location = /` (exact match), NOT a server-level `if`.
    # A server-level `if ($request_method = POST) { return 200; }` intercepts
    # ALL POST requests — including /api/chat — returning empty 200 responses.
    location = / {
        if ($request_method = POST) {
            return 200;
        }
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Chat/SSE streaming — MUST come BEFORE /api/ (more specific prefix first)
    location /api/chat {
        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        gzip off;
        tcp_nodelay on;
        add_header X-Accel-Buffering no;
    }

    # Other API routes (non-streaming)
    location /api/ {
        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js frontend (catch-all)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
